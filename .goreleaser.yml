version: 2
project_name: oauth

builds:
  - id: oauth
    main: ./cmd/oauth
    binary: oauth
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Tag }}

archives:
  - id: oauth
    formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: ikigenba
    name: oauth

changelog:
  use: github
  sort: asc
